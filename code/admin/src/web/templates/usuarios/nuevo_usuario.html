{% extends "base.html" %}

{% block title %}Nuevo Usuario{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-8">
  <div class="bg-white rounded-lg shadow p-6 border border-gray-200">
    <div class="mb-6">
      <h2 class="text-xl font-semibold text-[#001F3F]">Crear Nuevo Usuario</h2>
      <p class="text-sm text-gray-500 mt-1">Complete todos los campos requeridos</p>
    </div>

    

    <form id="usuario-form" action="{{ url_for('auth.crear_usuario') }}" method="POST" class="space-y-6" novalidate>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">
            Nombre <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            required
            maxlength="100"
            class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="Ingrese el nombre"
          />
          <div id="nombre-error" class="text-red-600 text-sm mt-1 hidden"></div>
        </div>

        <div>
          <label for="apellido" class="block text-sm font-medium text-gray-700 mb-1">
            Apellido <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="apellido"
            name="apellido"
            required
            maxlength="100"
            class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="Ingrese el apellido"
          />
          <div id="apellido-error" class="text-red-600 text-sm mt-1 hidden"></div>
        </div>
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email <span class="text-red-500">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          required
          maxlength="100"
          class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="usuario@ejemplo.com"
        />
        <div id="email-error" class="text-red-600 text-sm mt-1 hidden"></div>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Contraseña <span class="text-red-500">*</span>
        </label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
          class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Mínimo 6 caracteres"
        />
        <div id="password-error" class="text-red-600 text-sm mt-1 hidden"></div>
        <p class="text-xs text-gray-500 mt-1">La contraseña debe tener al menos 6 caracteres</p>
      </div>

      <div>
        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">
          Confirmar Contraseña <span class="text-red-500">*</span>
        </label>
        <input
          type="password"
          id="confirm-password"
          name="confirm-password"
          required
          minlength="6"
          class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Repita la contraseña"
        />
        <div id="confirm-password-error" class="text-red-600 text-sm mt-1 hidden"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label for="activo" class="block text-sm font-medium text-gray-700 mb-1">
            Estado <span class="text-red-500">*</span>
          </label>
          <select
            id="activo"
            name="activo"
            required
            class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="">Seleccione estado</option>
            <option value="true" selected>Activo</option>
            <option value="false">Inactivo</option>
          </select>
          <div id="activo-error" class="text-red-600 text-sm mt-1 hidden"></div>
        </div>

        <div>
          <label for="id_rol" class="block text-sm font-medium text-gray-700 mb-1">
            Rol <span class="text-red-500">*</span>
          </label>
          <select
            id="id_rol"
            name="id_rol"
            required
            class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="">Seleccione un rol</option>
            {% for rol in roles %}
              <option value="{{ rol.id_rol }}">{{ rol.descripcion }}</option>
            {% endfor %}
          </select>
          <div id="id_rol-error" class="text-red-600 text-sm mt-1 hidden"></div>
        </div>
      </div>

      <div class="flex justify-between items-center pt-6">
        <a href="{{ url_for('auth.listar_usuarios') }}" 
           class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Cancelar
        </a>
        
        <button
          type="submit"
          class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500"
        >
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          Crear Usuario
        </button>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('usuario-form');
    const inputs = form.querySelectorAll('input, select');

    const emailInput = document.getElementById('email');
    let emailValidationTimeout;

    inputs.forEach(input => {
        input.addEventListener('blur', function() {
            validateField(this);
        });
        
        input.addEventListener('input', function() {
            clearError(this);
        });
    });

    emailInput.addEventListener('input', function() {
        clearTimeout(emailValidationTimeout);
        clearError(this);
        
        emailValidationTimeout = setTimeout(() => {
            if (this.value.trim().length > 0) {
                validateEmailAvailability(this.value.trim());
            }
        }, 800);
    });

    document.getElementById('confirm-password').addEventListener('input', function() {
        validatePasswordMatch();
    });

    document.getElementById('password').addEventListener('input', function() {
        validatePasswordMatch();
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        let isValid = true;
        inputs.forEach(input => {
            if (!validateField(input)) {
                isValid = false;
            }
        });

        if (!validatePasswordMatch()) {
            isValid = false;
        }

        if (isValid) {
            const confirmPasswordField = document.getElementById('confirm-password');
            confirmPasswordField.remove();
            form.submit();
        }
    });

    function validateField(field) {
        const value = field.value.trim();
        const fieldName = field.name;
        let isValid = true;
        let errorMessage = '';

        clearError(field);

        if (field.required && !value) {
            errorMessage = 'Este campo es requerido';
            isValid = false;
        }
        else if (fieldName === 'email' && value) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(value)) {
                errorMessage = 'Ingrese un email válido';
                isValid = false;
            }
        }
        else if (fieldName === 'password' && value) {
            if (value.length < 6) {
                errorMessage = 'La contraseña debe tener al menos 6 caracteres';
                isValid = false;
            }
        }
        else if ((fieldName === 'nombre' || fieldName === 'apellido' || fieldName === 'email') && value.length > 100) {
            errorMessage = 'Este campo no puede exceder 100 caracteres';
            isValid = false;
        }

        if (!isValid) {
            showError(field, errorMessage);
        }

        return isValid;
    }

    function validatePasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const confirmField = document.getElementById('confirm-password');

        clearError(confirmField);

        if (confirmPassword && password !== confirmPassword) {
            showError(confirmField, 'Las contraseñas no coinciden');
            return false;
        }

        return true;
    }

    function validateEmailAvailability(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showError(emailInput, 'Ingrese un email válido');
            return;
        }

        showValidating(emailInput, 'Verificando disponibilidad...');

        fetch('/auth/usuarios/validar-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email: email })
        })
        .then(response => response.json())
        .then(data => {
            clearValidating(emailInput);
            
            if (data.valido) {
                showSuccess(emailInput, data.mensaje);
            } else {
                showError(emailInput, data.mensaje);
            }
        })
        .catch(error => {
            clearValidating(emailInput);
            showError(emailInput, 'Error al verificar el email');
        });
    }

    function showError(field, message) {
        field.classList.add('border-red-500');
        field.classList.remove('border-gray-300', 'border-green-500');
        
        const errorDiv = document.getElementById(field.name + '-error');
        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden', 'text-green-600', 'text-blue-600');
            errorDiv.classList.add('text-red-600');
        }
    }

    function showSuccess(field, message) {
        field.classList.add('border-green-500');
        field.classList.remove('border-gray-300', 'border-red-500');
        
        const errorDiv = document.getElementById(field.name + '-error');
        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden', 'text-red-600', 'text-blue-600');
            errorDiv.classList.add('text-green-600');
        }
    }

    function showValidating(field, message) {
        field.classList.remove('border-red-500', 'border-green-500');
        field.classList.add('border-gray-300');
        
        const errorDiv = document.getElementById(field.name + '-error');
        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden', 'text-red-600', 'text-green-600');
            errorDiv.classList.add('text-blue-600');
        }
    }

    function clearValidating(field) {
    }

    function clearError(field) {
        field.classList.remove('border-red-500', 'border-green-500');
        field.classList.add('border-gray-300');
        
        const errorDiv = document.getElementById(field.name + '-error');
        if (errorDiv) {
            errorDiv.textContent = '';
            errorDiv.classList.add('hidden');
            errorDiv.classList.remove('text-red-600', 'text-green-600', 'text-blue-600');
        }
    }
});
</script>
{% endblock %}
