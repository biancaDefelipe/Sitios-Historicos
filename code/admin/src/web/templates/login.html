{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
  <div class="bg-white rounded-lg shadow p-6 border border-gray-200">
    <h2 class="text-xl font-semibold text-[#001F3F] text-center">Iniciar sesión</h2>
    <p class="text-sm text-gray-500 text-center mt-1 mb-4">Ingresá tu email y contraseña</p>

    {% if mensajes_mantenimiento %}
  <div class="mb-4 space-y-2">
    {% for mensaje in mensajes_mantenimiento %}
      <div class="p-3 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 rounded">
        <strong>⚠ Mantenimiento:</strong> {{ mensaje }}
      </div>
    {% endfor %}
  </div>
{% endif %}

    

    <form action="{{ url_for('auth.autenticar') }}" method="POST" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="tuemail@ejemplo.com"
          class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="********"
          class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-[#1C453A] hover:bg-[#2E594F] text-white font-semibold rounded-md px-4 py-2 transition">
        Iniciar sesión
      </button>
    </form>
  </div>
</div>
{% endblock %}
